services:
  bot:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3847}:${PORT:-3847}"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    networks:
      - claude-bot

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: claude_bot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-claude_bot_secret}
      POSTGRES_DB: claude_bot
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claude_bot -d claude_bot"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - claude-bot

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama:/root/.ollama
    networks:
      - claude-bot

  ollama-init:
    image: curlimages/curl:latest
    depends_on:
      - ollama
    environment:
      OLLAMA_URL: http://ollama:11434
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for Ollama..."
        until curl -sf http://ollama:11434/api/tags > /dev/null 2>&1; do sleep 2; done
        echo "Pulling $$EMBEDDING_MODEL..."
        curl -sf http://ollama:11434/api/pull -d "{\"name\": \"$$EMBEDDING_MODEL\"}"
        echo "Done."
    networks:
      - claude-bot

volumes:
  pgdata:
  ollama:

networks:
  claude-bot:
